services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    depends_on:
      - game-server
    restart: unless-stopped
    volumes:
      - prisma_data:/app/prisma

  game-server:
    build:
      context: ./game-server
      dockerfile: Dockerfile
    env_file:
      - ./game-server/.env.production
    ports:
      - "4001:4001"
    restart: unless-stopped

volumes:
  prisma_data:
