services:
  neon-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neon-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@neon-db:5432/neon_vault
      - REDIS_URL=redis://neon-redis:6379
      - NEXT_PUBLIC_GAME_SERVER_URL=${NEXT_PUBLIC_GAME_SERVER_URL:-http://localhost:5000}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:5000}
      - GAME_SERVER_INTERNAL_URL=http://neon-backend:5000
    depends_on:
      - neon-db
      - neon-redis
      - neon-backend
    networks:
      - neon-network
    command: sh -c "npx prisma migrate deploy && npm run start -- -H 0.0.0.0 -p 3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  neon-backend:
    build:
      context: ./game-server
      dockerfile: Dockerfile
    container_name: neon-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./game-server/.env.production
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:3000}
      - CLIENT_ORIGINS=${CLIENT_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - APP_INTERNAL_URL=http://neon-app:3000
    networks:
      - neon-network

  neon-db:
    image: postgres:16-alpine
    container_name: neon-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=neon_vault
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - neon-network
    ports:
      - "5432:5432"

  neon-redis:
    image: redis:7-alpine
    container_name: neon-redis
    restart: always
    networks:
      - neon-network
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

networks:
  neon-network:
    driver: bridge

volumes:
  postgres_data:
